services:
  # --- Web API (Docker) ---
  - type: web
    name: gold-playwright-api
    env: docker
    plan: free

  # --- Cron Job (Node runtime, NOT docker) ---
  - type: cron
    name: gold-price-cron
    runtime: node
    schedule: "0 4-22/3 * * *"
    buildCommand: |
      npm install
      npx playwright install --with-deps
      npm run build
    startCommand: node dist/runScraper.js